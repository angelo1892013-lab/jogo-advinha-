<!DOCTYPE html>
<html>
<head>
  <title>🎮 Adivinha 0-100</title>
</head>

<body>

<h1>🎮 Adivinha o Número (0 a 100)</h1>

<p>Escreve um número:</p>

<input id="num" type="number">

<button onclick="verificar()">Tentar</button>
<button onclick="reiniciar()">🔄 Reiniciar</button>

<p id="msg"></p>

<script>
let segredo = Math.floor(Math.random() * 101); // 0 a 100

function verificar() {
  let valor = Number(document.getElementById("num").value);

  if (valor == segredo) {
    document.getElementById("msg").innerText = "🎉 Ganhaste!";
  } 
  else if (valor < segredo) {
    document.getElementById("msg").innerText = "⬆️ Mais alto!";
  } 
  else {
    document.getElementById("msg").innerText = "⬇️ Mais baixo!";
  }
}

function reiniciar() {
  segredo = Math.floor(Math.random() * 101);
  document.getElementById("msg").innerText = "";
  document.getElementById("num").value = "";
}
</script>

</body>
</html>>

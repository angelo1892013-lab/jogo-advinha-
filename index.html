<!DOCTYPE html>
<html>
<body>

<h1>🎮 Adivinha 0 a 100</h1>

<input id="num" type="number">

<button onclick="check()">Tentar</button>
<button onclick="reset()">Reiniciar</button>

<p id="msg"></p>

<script>
let secret = Math.floor(Math.random() * 101);

function check() {
  let n = document.getElementById("num").value;

  if (n == secret) {
    document.getElementById("msg").innerText = "🎉 Ganhaste!";
  }
  else if (n < secret) {
    document.getElementById("msg").innerText = "⬆️ Mais alto!";
  }
  else {
    document.getElementById("msg").innerText = "⬇️ Mais baixo!";
  }
}

function reset() {
  secret = Math.floor(Math.random() * 101);
  document.getElementById("msg").innerText = "";
  document.getElementById("num").value = "";
}
</script>

</body>
</html>
